<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconocimiento Facial</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
  <style>
    body { text-align: center; padding: 20px; }
    #webcam { width: 200px; height: 200px; border: 2px solid #333; margin: 20px auto; }
    #resultado { font-size: 20px; margin: 20px; padding: 15px; }
  </style>
</head>
<body>
  <h1>Reconocimiento Facial</h1>
  <video id="webcam" autoplay playsinline></video>
  <canvas id="canvas" width="150" height="150" style="display:none"></canvas>
  <div id="resultado">Cargando...</div>

  <script>
    let modelo;
    let webcam;
    let canvas;
    let ctx;
    let clases = {};

    window.onload = async () => {
      try {
        // Cargar clases
        const resp = await fetch('clases.json');
        clases = await resp.json();
        
        // Cargar modelo (USAR loadGraphModel en lugar de loadLayersModel)
        modelo = await tf.loadGraphModel('model.json');
        
        // Iniciar cámara
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        webcam = document.getElementById('webcam');
        webcam.srcObject = stream;
        
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        
        setTimeout(procesarFrame, 2000);
        
      } catch (err) {
        document.getElementById('resultado').textContent = 'Error: ' + err.message;
      }
    };

    async function procesarFrame() {
      if (!modelo || !webcam) {
        setTimeout(procesarFrame, 500);
        return;
      }
      
      try {
        // Capturar frame
        ctx.drawImage(webcam, 0, 0, 150, 150);
        
        // Preprocesar: RGB → Grayscale → Normalizar
        const imgData = ctx.getImageData(0, 0, 150, 150);
        const tensor = tf.tidy(() => {
          return tf.browser.fromPixels(imgData)
            .mean(2)  // RGB → Grayscale
            .expandDims(2)
            .expandDims(0)
            .div(255.0);
        });
        
        // Predecir
        const pred = modelo.predict(tensor);
        const logits = await pred.data();
        
        // Calcular softmax
        const maxLogit = Math.max(...logits);
        const expLogits = logits.map(l => Math.exp(l - maxLogit));
        const sumExp = expLogits.reduce((a, b) => a + b, 0);
        const probs = expLogits.map(e => e / sumExp);
        
        const idx = probs.indexOf(Math.max(...probs));
        const conf = Math.max(...probs) * 100;
        
        // Mostrar resultado
        const res = document.getElementById('resultado');
        if (conf > 35 && clases[idx]) {
          res.textContent = `${clases[idx]} (${conf.toFixed(0)}%)`;
          res.style.background = '#d4edda';
        } else {
          res.textContent = 'No reconocido';
          res.style.background = '#f8d7da';
        }
        
        tensor.dispose();
        pred.dispose();
        
      } catch (err) {
        console.error(err);
      }
      
      setTimeout(procesarFrame, 800);
    }
  </script>
</body>
</html>
