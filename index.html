<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconocimiento Facial ITSE</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
    h1 { color: #333; text-align: center; }
    .webcam { width: 200px; height: 200px; margin: 20px auto; display: block; border: 2px solid #333; }
    #resultado { text-align: center; font-size: 24px; margin: 20px 0; padding: 15px; border-radius: 5px; }
    .loading { background: #f5f5f5; color: #666; }
    .reconocido { background: #d4edda; color: #155724; }
    .no-reconocido { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎓 Reconocimiento Facial ITSE</h1>
    <video id="webcam" class="webcam" autoplay playsinline></video>
    <canvas id="canvas" width="150" height="150" style="display:none"></canvas>
    <div id="resultado" class="loading">🔄 Cargando...</div>
  </div>

  <script>
    let modelo;
    let webcam;
    let canvas;
    let ctx;
    let procesando = false;

    // 17 clases (17 personas)
    const CLASES = [
      "Alioth", "Daniela", "Elohim", "Gabriel", "Idney", 
      "Jesus", "Josue", "Kevin", "Martin", "Miguel", 
      "Nicole", "Patricia", "Roberto", "Victor", 
      "Persona_15", "Persona_16", "Persona_17"
    ];

    // Cargar modelo al iniciar
    window.onload = async () => {
      try {
        document.getElementById('resultado').textContent = '🔄 Cargando modelo...';
        console.log('Cargando modelo...');
        
        modelo = await tf.loadLayersModel('model.json');
        console.log('✅ Modelo cargado');
        
        document.getElementById('resultado').textContent = '📷 Iniciando cámara...';
        await iniciarCamara();
        
      } catch (err) {
        console.error('❌ Error:', err);
        document.getElementById('resultado').textContent = '❌ Error al cargar';
        document.getElementById('resultado').className = 'no-reconocido';
      }
    };

    async function iniciarCamara() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 200, height: 200 } 
        });
        
        webcam = document.getElementById('webcam');
        webcam.srcObject = stream;
        
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        
        setTimeout(procesarFrame, 2000);
        
      } catch (err) {
        console.error('❌ Error cámara:', err);
        document.getElementById('resultado').textContent = '❌ Cámara no disponible';
        document.getElementById('resultado').className = 'no-reconocido';
      }
    }

    async function procesarFrame() {
      if (!modelo || procesando) {
        setTimeout(procesarFrame, 500);
        return;
      }
      
      procesando = true;
      
      try {
        // Capturar frame
        ctx.drawImage(webcam, 0, 0, 150, 150);
        
        // Preprocesar: RGB → Grayscale → Normalizar
        const imgData = ctx.getImageData(0, 0, 150, 150);
        const tensor = tf.tidy(() => {
          return tf.browser.fromPixels(imgData)
            .mean(2)  // RGB → Grayscale
            .expandDims(2)
            .expandDims(0)
            .toFloat()
            .div(255.0);
        });
        
        // Predecir
        const prediccion = modelo.predict(tensor);
        const logits = await prediccion.data();
        
        // Calcular softmax
        const maxLogit = Math.max(...logits);
        const expLogits = logits.map(l => Math.exp(l - maxLogit));
        const sumExp = expLogits.reduce((a, b) => a + b, 0);
        const probs = expLogits.map(e => e / sumExp);
        
        const claseIdx = probs.indexOf(Math.max(...probs));
        const confianza = Math.max(...probs) * 100;
        
        // Mostrar resultado
        const resultadoDiv = document.getElementById('resultado');
        if (confianza > 35 && claseIdx < CLASES.length) {
          resultadoDiv.className = 'reconocido';
          resultadoDiv.textContent = `${CLASES[claseIdx]} (${confianza.toFixed(0)}%)`;
        } else {
          resultadoDiv.className = 'no-reconocido';
          resultadoDiv.textContent = '❓ No reconocido';
        }
        
        // Limpiar memoria
        tensor.dispose();
        prediccion.dispose();
        
      } catch (err) {
        console.error('Error:', err);
      }
      
      procesando = false;
      setTimeout(procesarFrame, 800);
    }
  </script>
</body>
</html>
