<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reconocimiento Facial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
        #container { background: white; padding: 20px; border-radius: 10px; max-width: 700px; margin: 0 auto; }
        video { width: 640px; height: 480px; border: 3px solid #333; background: #000; }
        #resultado { font-size: 20px; margin: 20px 0; padding: 15px; border-radius: 8px; font-weight: bold; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button { background: #4CAF50; color: white; padding: 15px 30px; font-size: 18px; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #cccccc; }
    </style>
</head>
<body>
    <div id="container">
        <h1>🎓 Reconocimiento de Compañeros</h1>
        <div id="resultado" class="loading">Cargando...</div>
        <video id="video" autoplay playsinline></video><br>
        <button id="btn" onclick="identificar()" disabled>📸 Identificar</button>
    </div>

    <script>
        let modelo, nombres = {};
        
        async function init() {
            const res = document.getElementById('resultado');
            try {
                // Cargar modelo (tu JSON ya está correcto)
                modelo = await tf.loadLayersModel('model.json');
                
                // Cargar nombres
                const clases = await fetch('clases.json').then(r => r.json());
                for(let [n, i] of Object.entries(clases)) nombres[i] = n;
                
                // Cámara
                const stream = await navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480}});
                document.getElementById('video').srcObject = stream;
                
                res.className = 'success';
                res.innerText = '✅ Listo - Mira a la cámara y presiona Identificar';
                document.getElementById('btn').disabled = false;
                
            } catch(e) {
                res.className = 'error';
                res.innerText = '❌ Error: ' + e.message;
                console.error(e);
            }
        }

        async function identificar() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            canvas.width = 640; 
            canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            // IMPORTANTE: Grayscale (1 canal) como entrenaste
            let tensor = tf.browser.fromPixels(canvas, 1);
            tensor = tf.div(tensor, 255.0);
            tensor = tensor.expandDims(0); // [1, 480, 640, 1]
            
            const pred = await modelo.predict(tensor).data();
            const id = pred.indexOf(Math.max(...pred));
            const confianza = (pred[id] * 100).toFixed(1);
            
            document.getElementById('resultado').innerHTML = 
                `👤 ${nombres[id] || 'Desconocido'}<br>Confianza: ${confianza}%`;
            
            tensor.dispose();
            btn.disabled = false;
        }
        
        window.onload = init;
    </script>
</body>
</html>
